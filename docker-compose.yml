version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=comments_db
      - POSTGRES_USER=comments_user
      - POSTGRES_PASSWORD=comments_password
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://comments_user:comments_password@db:5432/comments_db
    depends_on:
      - db
      - redis

volumes:
  postgres_data: